<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Berkeley Lab Leave Tracker — Vacation &amp; Sick Leave</title>
<style>
:root{
  --blue:#003262; --teal:#007681; --gold:#FDB515; --red:#c0392b; --orange:#e67e22;
  --green:#1e8449; --bg:#f2f6f8; --card:#ffffff; --line:#dde5ea; --txt:#22323c; --mut:#5f7482;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
header{background:var(--blue);color:#fff;padding:14px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:0;z-index:20;box-shadow:0 2px 6px rgba(0,0,0,.25)}
header h1{font-size:19px;margin:0;flex:1;min-width:220px;font-weight:600}
header h1 small{display:block;font-size:12px;font-weight:400;opacity:.85}
.btn{border:none;border-radius:6px;padding:8px 14px;font-size:13.5px;cursor:pointer;font-weight:600;background:#e8eef3;color:var(--blue)}
.btn:hover{filter:brightness(.95)}
.btn.primary{background:var(--gold);color:#3b2a00}
.btn.ghost{background:rgba(255,255,255,.15);color:#fff}
.btn.danger{background:#fdecea;color:var(--red)}
.btn.small{padding:4px 9px;font-size:12.5px}
main{max-width:1080px;margin:0 auto;padding:18px 16px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,40,70,.06)}
.card h2{margin:0 0 12px;font-size:16.5px;color:var(--blue)}
.grid{display:grid;gap:14px}
.grid.cols4{grid-template-columns:repeat(auto-fit,minmax(215px,1fr))}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.kpi .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);font-weight:700}
.kpi .val{font-size:26px;font-weight:700;color:var(--blue);margin:4px 0 2px}
.kpi .sub{font-size:12.5px;color:var(--mut)}
.typeSel{display:block;width:100%;max-width:130px;margin:3px 0 0 auto;font-size:11px;padding:2px 4px;border:1px solid var(--line);border-radius:4px;color:var(--txt);background:#fff}
.bar{height:8px;background:#e5edf2;border-radius:5px;margin-top:8px;overflow:hidden}
.bar>span{display:block;height:100%;border-radius:5px;background:var(--teal)}
.gauge{height:34px;background:#e5edf2;border-radius:9px;overflow:hidden;margin:12px 0 6px;border:1px solid var(--line)}
.gauge>span{display:block;height:100%;border-radius:9px 0 0 9px;transition:width .4s}
.gauge-cap{display:flex;justify-content:space-between;font-size:12.5px;color:var(--mut)}
.gauge-cap b{color:var(--blue);font-size:14px}
.banner{border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:14.5px;border:1px solid}
.banner b{font-size:15.5px}
.banner.red{background:#fdecea;border-color:#f2b8b5;color:#7c1d12}
.banner.orange{background:#fef4e6;border-color:#f5d3a1;color:#7a4b09}
.banner.green{background:#eaf7ef;border-color:#bfe3cd;color:#14532d}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{background:#eef4f8;color:var(--blue);text-align:left;padding:7px 8px;border-bottom:2px solid var(--line);white-space:nowrap;font-size:12.5px}
td{padding:5px 8px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}
tr:hover td{background:#f7fafc}
td input[type=number]{width:78px;padding:4px 6px;border:1px solid #c6d3dc;border-radius:5px;font-size:13px}
td input[type=text]{width:150px;padding:4px 6px;border:1px solid #c6d3dc;border-radius:5px;font-size:13px}
td.num,th.num{text-align:right}
.lost{color:var(--red);font-weight:700}
.zero{color:#b8c4cc}
.neg{color:var(--red);font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-weight:600;font-size:13.5px;margin-bottom:4px;color:var(--blue)}
.field .hint{font-size:12.5px;color:var(--mut);margin-top:3px}
.field input,.field select{padding:8px 10px;border:1px solid #c6d3dc;border-radius:6px;font-size:14px;width:100%;max-width:340px;background:#fff}
.field input[type=radio],.field input[type=checkbox]{width:auto}
.radio-row{display:flex;gap:10px;flex-wrap:wrap}
.radio-card{border:2px solid var(--line);border-radius:8px;padding:10px 14px;cursor:pointer;flex:1;min-width:200px;background:#fff}
.radio-card.sel{border-color:var(--teal);background:#f0f9fa}
.radio-card b{display:block;color:var(--blue)}
.radio-card span{font-size:12.5px;color:var(--mut)}
.row2{display:flex;gap:18px;flex-wrap:wrap}
.row2>div{flex:1;min-width:230px}
.flexbtns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
details{margin-top:10px}
summary{cursor:pointer;font-weight:600;color:var(--teal);font-size:14px}
.note{font-size:12.5px;color:var(--mut)}
.savebar{font-size:12.5px;color:#cfe3ee}
footer{max-width:1080px;margin:0 auto;padding:0 16px 40px;font-size:12.5px;color:var(--mut)}
footer .disc{background:#fffbe9;border:1px solid #f1e3ab;border-radius:8px;padding:12px 16px}
a{color:var(--teal)}
.slider-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:8px 0 4px}
.slider-row input[type=range]{flex:1;min-width:180px;max-width:420px}
.slider-val{font-weight:700;color:var(--blue);min-width:170px}
.chart-wrap{overflow-x:auto}
.legend{font-size:12px;color:var(--mut);margin-top:4px}
.legend i{display:inline-block;width:12px;height:3px;vertical-align:middle;margin:0 4px 0 12px}
.tiertab td,.tiertab th{white-space:normal}
.modalbg{position:fixed;inset:0;background:rgba(10,30,45,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto}
.modal{background:#fff;border-radius:12px;max-width:760px;width:100%;padding:22px 26px;position:relative}
.modal h2{color:var(--blue);margin-top:0}
.modal .close{position:absolute;top:10px;right:14px;font-size:22px;border:none;background:none;cursor:pointer;color:var(--mut)}
.pill{display:inline-block;background:#eef4f8;color:var(--blue);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;margin-left:6px}
.behind{background:#fef4e6;border:1px solid #f5d3a1;border-radius:8px;padding:8px 12px;font-size:13px;color:#7a4b09;margin-bottom:10px}
@media(max-width:640px){ header h1{font-size:16px} .kpi .val{font-size:22px} }
@media print{ header .flexbtns,.btn{display:none} body{background:#fff} .card{box-shadow:none} }
</style>
</head>
<body>
<script id="app-data" type="application/json">null</script>
<header>
  <h1>Berkeley Lab Leave Tracker<small>Vacation &amp; sick leave — never lose an hour to the accrual cap</small></h1>
  <div class="flexbtns" id="headerBtns"></div>
</header>
<main id="app"></main>
<footer id="foot"></footer>

<script>
"use strict";
/* ================= CONSTANTS (RPM "Vacation Leave", pub. 7/9/2021, eff. 7/1/2020 + Factor Leave Accrual Tables) ================= */
const SICK_F = 0.046154;               // sick accrual factor per hour on pay status (no maximum)
const TIERS = {
  standard: [                           // non-represented Career/Term/Visiting Researcher/Limited/Postdoc
    {min:0,  f:0.057692, days:15},      // cap = 2x annual accrual -> days*16 hrs (FT): 240
    {min:10, f:0.069231, days:18},      // 288
    {min:15, f:0.080769, days:21},      // 336
    {min:20, f:0.092308, days:24}       // 384
  ],
  smg: [                                // Senior Management Group
    {min:0,  f:0.069231, days:18},
    {min:5,  f:0.080769, days:21},
    {min:10, f:0.092308, days:24}
  ]
};
const LS_KEY = "lbl-leave-tracker-v1";
/* Leave-type options per balance family — from LBL "Guide to Frequently Used LETS Codes" */
const VAC_TYPES  = ["Vacation","Vacation – FMLA/CFRA","Vacation – PDL"];
const SICK_TYPES = ["Employee Sick","Family Sick","Sick – FMLA/CFRA","Sick – PDL","Bereavement"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* ================= STATE ================= */
let state = null;   // {version, savedAt, profile:{...}, periods:[...]}

function blankState(){ return {version:1, savedAt:null, profile:null, periods:[]}; }

function loadState(){
  let emb=null, ls=null;
  try{ emb = JSON.parse(document.getElementById("app-data").textContent); }catch(e){}
  try{ ls  = JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){}
  if(emb && ls){ state = (new Date(ls.savedAt||0) >= new Date(emb.savedAt||0)) ? ls : emb; }
  else state = emb || ls || blankState();
  if(!state.periods) state.periods = [];
}
function persist(){
  state.savedAt = new Date().toISOString();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
  const s=document.getElementById("saveStatus");
  if(s) s.textContent = "Saved in this browser ✓ " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

/* ================= DATE HELPERS ================= */
function pad(n){ return (n<10?"0":"")+n; }
function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function fromISO(s){ const p=s.split("-"); return new Date(+p[0], +p[1]-1, +(p[2]||1)); }
function monthEnd(y,m){ return new Date(y, m+1, 0); }               // m: 0-11
function monthsBetween(a,b){ return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()) + (b.getDate()>=a.getDate()?0:-1); }
function weekdaysInMonth(y,m){
  let c=0; const d=new Date(y,m,1);
  while(d.getMonth()===m){ const w=d.getDay(); if(w>0&&w<6)c++; d.setDate(d.getDate()+1); }
  return c;
}
function fmtDate(d){ return MONTHS[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); }

/* ================= LEAVE MATH ================= */
function tierAt(dateEnd){
  const p=state.profile;
  const start=fromISO(p.serviceStart+"-01");
  const years = monthsBetween(start, dateEnd)/12;
  const tab = TIERS[p.group]||TIERS.standard;
  let t=tab[0];
  for(const row of tab){ if(years>=row.min) t=row; }
  return t;
}
function nextTierInfo(){
  const p=state.profile;
  const start=fromISO(p.serviceStart+"-01");
  const now=new Date();
  const years = monthsBetween(start, now)/12;
  const tab=TIERS[p.group]||TIERS.standard;
  for(const row of tab){
    if(row.min>years){
      const d=new Date(start); d.setFullYear(d.getFullYear()+row.min);
      return {row, date:d};
    }
  }
  return null;
}
function maxHrsFor(tier){ return tier.days*16*state.profile.pct/100; }  // cap = 2x annual accrual, prorated for part-time
function basePeriodHours(end){                                          // full-time hours in an accrual period
  return state.profile.payType==="monthly" ? weekdaysInMonth(end.getFullYear(), end.getMonth())*8 : 160;
}
function scheduledHours(end){ return basePeriodHours(end)*state.profile.pct/100; }

function nextPeriodEnd(prevEndISO){
  const p=state.profile;
  if(p.payType==="monthly"){
    const d=fromISO(prevEndISO);
    return iso(monthEnd(d.getFullYear(), d.getMonth()+1));
  } else {
    const d=fromISO(prevEndISO); d.setDate(d.getDate()+28);
    return iso(d);
  }
}
function firstAnchorISO(){
  const p=state.profile;
  if(p.payType==="monthly"){
    const [y,m]=p.balanceAsOf.split("-").map(Number);
    return iso(monthEnd(y, m-1));
  }
  return p.balanceAsOf; // biweekly: exact cycle-end date
}
function periodLabel(endISO){
  const d=fromISO(endISO);
  return state.profile.payType==="monthly" ? MONTHS[d.getMonth()]+" "+d.getFullYear() : "Cycle end "+(d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();
}

/* Walk the log: returns rows with computed balances */
function computeRows(){
  const p=state.profile;
  let vac=p.startVac, sick=p.startSick, lostTotal=0;
  const rows=[];
  for(const r of state.periods){
    const end=fromISO(r.end);
    const tier=tierAt(end);
    const maxH=maxHrsFor(tier);
    const counted=Math.min(r.paidHours||0, basePeriodHours(end));   // overtime/on-call never counts
    const accr=tier.f*counted;
    const sickAccr=SICK_F*counted;
    const beg=vac;
    const raw=beg + accr - (r.vacTaken||0);
    const floor=beg - (r.vacTaken||0);
    const endBal=Math.min(raw, Math.max(maxH, floor));
    const lost=Math.max(0, raw-endBal);
    lostTotal+=lost;
    const sickBeg=sick;
    sick = sick + sickAccr - (r.sickTaken||0);
    vac = endBal;
    rows.push({r, end, tier, maxH, counted, accr, sickAccr, beg, endBal, lost, sickBeg, sickEnd:sick});
  }
  return {rows, vac, sick, lostTotal};
}

/* Project forward from the current balance */
function projectForward(useDaysPerPeriod, nPeriods){
  const p=state.profile;
  const c=computeRows();
  let vac=c.vac;
  let endISO = state.periods.length ? state.periods[state.periods.length-1].end : firstAnchorISO();
  const out=[];
  const useHrs=useDaysPerPeriod*8;
  for(let i=0;i<nPeriods;i++){
    endISO=nextPeriodEnd(endISO);
    const end=fromISO(endISO);
    const tier=tierAt(end);
    const maxH=maxHrsFor(tier);
    const counted=scheduledHours(end);
    const accr=tier.f*counted;
    const take=Math.min(useHrs, Math.max(0, vac+accr));
    const raw=vac+accr-take;
    const floor=vac-take;
    const bal=Math.min(raw, Math.max(maxH, floor));
    const lost=Math.max(0, raw-bal);
    vac=bal;
    out.push({endISO, end, bal, maxH, lost, accr});
  }
  return out;
}

/* ================= FORMAT ================= */
function h2(x){ return (Math.round(x*100)/100).toFixed(2); }
function hd(x){ return h2(x)+" h ("+h2(x/8)+" d)"; }
function dOnly(x){ return h2(x/8); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ================= RENDER ================= */
const app=document.getElementById("app");

function render(){
  document.getElementById("headerBtns").innerHTML = state.profile ? `
    <span class="savebar" id="saveStatus"></span>
    <button class="btn" onclick="openEditPanel()">✏️ Edit profile</button>
    <button class="btn primary" onclick="saveFile()">💾 Save to file</button>
    <button class="btn ghost" onclick="openHelp()">❓ Help &amp; policy</button>` :
    `<button class="btn ghost" onclick="openHelp()">❓ Help &amp; policy</button>`;
  if(!state.profile) renderWizard(); else renderMain();
  renderFooter();
}

/* ---------- Setup wizard ---------- */
function renderWizard(){
  const today=new Date();
  const defMonth = today.getFullYear()+"-"+pad(today.getMonth()===0?12:today.getMonth());
  app.innerHTML = `
  <div class="card" style="max-width:720px;margin:20px auto">
    <h2>Welcome! Set up your tracker (2 minutes)</h2>
    <p class="note">Everything stays on <b>your</b> computer — nothing is uploaded anywhere. You'll find all of these numbers in <b>LETS</b> (Leave balances) and on your paystub.</p>

    <div class="field">
      <label>Your name <span class="note">(optional — shown on the page)</span></label>
      <input id="w_name" type="text" placeholder="e.g., Jane Doe">
    </div>

    <div class="field">
      <label>1 · How do you report time in LETS?</label>
      <div class="radio-row">
        <div class="radio-card sel" id="pt_monthly" onclick="wizPay('monthly')"><b>Monthly — salaried (exempt)</b><span>You report time in <b>days</b>. Leave accrues once per month.</span></div>
        <div class="radio-card" id="pt_biweekly" onclick="wizPay('biweekly')"><b>Bi-weekly — hourly (non-exempt)</b><span>You report time in <b>hours</b>. Leave accrues every quadri-weekly cycle (4 weeks, 13×/year).</span></div>
      </div>
    </div>

    <div class="field">
      <label>2 · Service credit start (month &amp; year)</label>
      <input id="w_service" type="month">
      <div class="hint">When your UC/Berkeley Lab qualifying service began. All prior UC / CA state agency / CSU service at ≥50% counts — if you had prior service, shift this date earlier accordingly. Your accrual rate steps up automatically at 10 / 15 / 20 years (SMG: 5 / 10).</div>
    </div>

    <div class="row2">
      <div class="field">
        <label>3 · Current <b>vacation</b> balance</label>
        <input id="w_vac" type="number" step="0.01" min="0" placeholder="hours, e.g. 271.82">
        <div class="hint">In <b>hours</b>, from LETS. (1 day = 8 hours)</div>
      </div>
      <div class="field">
        <label>Current <b>sick</b> balance</label>
        <input id="w_sick" type="number" step="0.01" min="0" placeholder="hours, e.g. 198.23">
        <div class="hint">In <b>hours</b>, from LETS.</div>
      </div>
    </div>

    <div class="field" id="asof_month">
      <label>4 · These balances are as of the end of…</label>
      <input id="w_asofM" type="month" value="${defMonth}">
      <div class="hint">Pick the last <b>fully processed</b> month in LETS. Tracking starts with the following month.</div>
    </div>
    <div class="field" id="asof_date" style="display:none">
      <label>4 · These balances are as of this cycle-end date…</label>
      <input id="w_asofD" type="date">
      <div class="hint">The end date of your most recent quadri-weekly cycle (see LETS). Cycles repeat every 28 days.</div>
    </div>

    <details>
      <summary>More options (part-time, SMG, pay rate)</summary>
      <div class="row2" style="margin-top:10px">
        <div class="field">
          <label>Appointment percent</label>
          <input id="w_pct" type="number" min="50" max="100" step="1" value="100">
          <div class="hint">100 = full-time (40 h/week). Part-time accrues and caps proportionally.</div>
        </div>
        <div class="field">
          <label>Appointment group</label>
          <select id="w_group">
            <option value="standard" selected>Standard (Career / Term / Visiting Researcher / Limited / Postdoc)</option>
            <option value="smg">Senior Management Group (SMG)</option>
          </select>
        </div>
        <div class="field">
          <label>Hourly pay rate ($, optional)</label>
          <input id="w_rate" type="number" min="0" step="0.01" placeholder="e.g. 45.50">
          <div class="hint">Only used to show the $ value of hours you'd forfeit at the cap. Stays on your computer.</div>
        </div>
      </div>
    </details>

    <p class="note" style="margin-top:14px">⚠️ Built from the LBNL RPM <i>Vacation Leave</i> policy for <b>non-represented</b> employees. If you are represented by a union, your collective bargaining agreement (CBA) may differ — verify your accrual rate and cap in your CBA before relying on this tool.</p>
    <button class="btn primary" style="font-size:15px;padding:10px 22px" onclick="finishWizard()">Start tracking →</button>
    <div class="note" id="w_err" style="color:var(--red);margin-top:8px"></div>
  </div>`;
}
let wizPayType="monthly";
function wizPay(t){
  wizPayType=t;
  document.getElementById("pt_monthly").classList.toggle("sel", t==="monthly");
  document.getElementById("pt_biweekly").classList.toggle("sel", t==="biweekly");
  document.getElementById("asof_month").style.display = t==="monthly"?"":"none";
  document.getElementById("asof_date").style.display  = t==="biweekly"?"":"none";
}
function finishWizard(){
  const err=document.getElementById("w_err");
  const service=document.getElementById("w_service").value;
  const vac=parseFloat(document.getElementById("w_vac").value);
  const sick=parseFloat(document.getElementById("w_sick").value);
  const asof = wizPayType==="monthly" ? document.getElementById("w_asofM").value : document.getElementById("w_asofD").value;
  if(!service){ err.textContent="Please enter your service credit start month."; return; }
  if(isNaN(vac)||isNaN(sick)){ err.textContent="Please enter your current vacation and sick balances (hours)."; return; }
  if(!asof){ err.textContent="Please enter the 'as of' date for your balances."; return; }
  state.profile={
    name: document.getElementById("w_name").value.trim(),
    payType: wizPayType,
    group: document.getElementById("w_group").value,
    pct: Math.min(100, Math.max(1, parseFloat(document.getElementById("w_pct").value)||100)),
    serviceStart: service,
    balanceAsOf: asof,
    startVac: vac, startSick: sick,
    rate: parseFloat(document.getElementById("w_rate").value)||0
  };
  state.periods=[];
  persist(); render();
}

/* ---------- Main screen ---------- */
function renderMain(){
  const p=state.profile;
  autoFillPeriods();
  const c=computeRows();
  const today=new Date();
  const tierNow=tierAt(today);
  const maxNow=maxHrsFor(tierNow);
  const head=Math.max(0,maxNow-c.vac);
  const nxt=nextTierInfo();
  const proj0=projectForward(0,26);
  const lost12=proj0.slice(0, p.payType==="monthly"?12:13).reduce((s,x)=>s+x.lost,0);
  const lostNext=proj0.length? proj0[0].lost : 0;
  const firstLoss=proj0.find(x=>x.lost>0);
  const perPeriodAccr = tierNow.f*scheduledHours(p.payType==="monthly"?monthEnd(today.getFullYear(),today.getMonth()):today);
  const svc=fromISO(p.serviceStart+"-01");
  const years=Math.floor(monthsBetween(svc,today)/12);

  /* status banner */
  let banner;
  if(c.vac>=maxNow-0.005){
    banner=`<div class="banner red"><b>🔴 You are AT your ${h2(maxNow)}-hour vacation cap.</b><br>
    Every period you stay here you forfeit ≈ <b>${h2(perPeriodAccr)} hours (${dOnly(perPeriodAccr)} days)</b>${p.rate?` ≈ <b>$${h2(perPeriodAccr*p.rate)}</b>`:""} of vacation you earned. Use at least <b>${dOnly(perPeriodAccr)} days per ${p.payType==="monthly"?"month":"cycle"}</b> to stop the loss — you earned it, take it.</div>`;
  } else if(firstLoss && monthsBetween(today, firstLoss.end)<=3){

function logRow(row,i,n){
  const p=state.profile, inDays=p.payType==="monthly";
  const conv=inDays?8:1;
  const overSched = (row.r.paidHours||0) > basePeriodHours(row.end)+0.001;
  return `<tr>
    <td><b>${periodLabel(row.r.end)}</b>${row.r.auto?` <span class="pill" style="background:#fef4e6;color:#7a4b09" title="Filled in automatically: normal schedule, no leave taken. Edit any cell to confirm/correct.">auto</span>`:""}<br><span class="note">${row.tier.f} × h</span></td>
    <td class="num"><input type="number" step="0.01" min="0" value="${row.r.paidHours}" onchange="updRow(${i},'paidHours',this.value,1)" title="Regular paid hours in this period (incl. holidays & paid leave)">${overSched?`<div class="note" title="Hours above the full-time schedule don't accrue leave">capped→${h2(row.counted)}</div>`:""}</td>
    <td class="num"><input type="number" step="${inDays?0.25:0.5}" min="0" value="${(row.r.vacTaken||0)/conv}" onchange="updRow(${i},'vacTaken',this.value,${conv})">${(row.r.vacTaken||0)>0?`<select class="typeSel" onchange="updRow(${i},'vacType',this.value,0)" title="Which LETS code this vacation-side leave was reported under">${VAC_TYPES.map(t=>`<option${(row.r.vacType||VAC_TYPES[0])===t?" selected":""}>${t}</option>`).join("")}</select>`:""}</td>
    <td class="num"><input type="number" step="${inDays?0.25:0.5}" min="0" value="${(row.r.sickTaken||0)/conv}" onchange="updRow(${i},'sickTaken',this.value,${conv})">${(row.r.sickTaken||0)>0?`<select class="typeSel" onchange="updRow(${i},'sickType',this.value,0)" title="Which LETS code this sick-side leave was reported under (Bereavement also deducts from sick balance)">${SICK_TYPES.map(t=>`<option${(row.r.sickType||SICK_TYPES[0])===t?" selected":""}>${t}</option>`).join("")}</select>`:""}</td>
    <td class="num">+${h2(row.accr)}</td>
    <td class="num"><b class="${row.endBal<0?"neg":""}">${h2(row.endBal)}</b><br><span class="note">${dOnly(row.endBal)} d</span></td>
    <td class="num ${row.lost>0.005?"lost":"zero"}">${row.lost>0.005?"−"+h2(row.lost):"0"}</td>
    <td class="num ${row.sickEnd<0?"neg":""}">${h2(row.sickEnd)}</td>
    <td><input type="text" value="${esc(row.r.note||"")}" onchange="updRow(${i},'note',this.value,0)" placeholder="e.g. FML, surgery…"></td>
    <td><button class="btn small danger" title="Remove this row. A completed period reappears as a fresh 'auto' row (normal schedule, no leave) — use this to reset a month you mis-entered." onclick="delRow(${i})">✕</button></td>
  </tr>`;
}

/* ---------- log actions ---------- */
function addPeriod(){
  const e = state.periods.length? state.periods[state.periods.length-1].end : firstAnchorISO();
  const endISO=nextPeriodEnd(e);
  state.periods.push({end:endISO, paidHours:Math.round(scheduledHours(fromISO(endISO))*100)/100, vacTaken:0, sickTaken:0, note:""});
  persist(); render();
}
function autoFillPeriods(){
  /* Zero-touch accrual: every completed period with no entry is assumed
     "worked normal schedule, took no leave" and is added automatically. */
  if(!state.profile) return 0;
  const today=new Date();
  const have=new Set(state.periods.map(r=>r.end));
  let n=nextPeriodEnd(firstAnchorISO()), added=0, guard=0;
  while(fromISO(n)<=today && guard<400){
    if(!have.has(n)){
      state.periods.push({end:n, paidHours:Math.round(scheduledHours(fromISO(n))*100)/100, vacTaken:0, sickTaken:0, note:"", auto:true});
      added++;
    }
    n=nextPeriodEnd(n); guard++;
  }
  if(added){ state.periods.sort((a,b)=>a.end.localeCompare(b.end)); persist(); }
  return added;
}
function updRow(i,field,val,conv){
  if(field==="note"||field==="vacType"||field==="sickType"){ state.periods[i][field]=val; }
  else{
    let v=parseFloat(val); if(isNaN(v)||v<0)v=0;
    state.periods[i][field]= field==="paidHours"? v : v*conv;
  }
  delete state.periods[i].auto;   // touched by the user -> confirmed
  persist(); render();
}
function delRow(i){
  const r=state.periods[i];
  const hasData=(r.vacTaken||0)>0||(r.sickTaken||0)>0||(r.note||"").length>0;
  if(hasData && !confirm("This row has leave entries. Remove it anyway?\n\nA completed period will come back automatically as a fresh 'auto' row (normal schedule, no leave taken).")) return;
  state.periods.splice(i,1); persist(); render();
}
function saveProfile(){
  const p=state.profile;
  p.name=document.getElementById("e_name").value.trim();
  p.serviceStart=document.getElementById("e_service").value||p.serviceStart;
  p.pct=Math.min(100,Math.max(1,parseFloat(document.getElementById("e_pct").value)||p.pct));
  p.group=document.getElementById("e_group").value;
  p.rate=parseFloat(document.getElementById("e_rate").value)||0;
  p.startVac=parseFloat(document.getElementById("e_vac").value)||0;
  p.startSick=parseFloat(document.getElementById("e_sick").value)||0;
  persist(); render();
}
function openEditPanel(){
  const d=document.getElementById("profilePanel");
  if(!d) return;
  d.open=true;
  d.scrollIntoView({behavior:"smooth",block:"center"});

/* ---------- chart ---------- */
function renderChart(){
  const box=document.getElementById("chartBox"); if(!box) return;
  const p=state.profile;
  const days=parseFloat(document.getElementById("planSlider").value);
  const perYear = p.payType==="monthly"?12:13;
  document.getElementById("planVal").textContent = days+" day"+(days===1?"":"s")+" / "+(p.payType==="monthly"?"month":"cycle")+" ("+(days*perYear)+" d/yr)";
  const n= p.payType==="monthly"?18:20;
  const proj=projectForward(days,n);
  const maxY=Math.max(...proj.map(x=>x.maxH), ...proj.map(x=>x.bal))*1.12+1;
  const W=Math.max(640, n*46), H=250, padL=46, padB=34, padT=10;
  const xw=(W-padL-12)/(n-1);
  const X=i=>padL+i*xw, Y=v=>padT+(H-padB-padT)*(1-v/maxY);
  let balPts="", capPts="", dots="", labels="", grid="";
  proj.forEach((pt,i)=>{
    balPts+=(i?" ":"")+X(i)+","+Y(pt.bal);
    capPts+=(i?" ":"")+X(i)+","+Y(pt.maxH);
    if(pt.lost>0.005) dots+=`<circle cx="${X(i)}" cy="${Y(pt.bal)}" r="4.5" fill="var(--orange)"><title>${periodLabel(pt.endISO)}: lost ${h2(pt.lost)} h</title></circle>`;
    if(i%2===0){
      const d=pt.end;
      labels+=`<text x="${X(i)}" y="${H-10}" font-size="10.5" text-anchor="middle" fill="#5f7482">${MONTHS[d.getMonth()]} ${String(d.getFullYear()).slice(2)}</text>`;
    }
  });
  for(let g=0;g<=4;g++){ const v=maxY/4*g;
    grid+=`<line x1="${padL}" y1="${Y(v)}" x2="${W-8}" y2="${Y(v)}" stroke="#e5edf2"/><text x="${padL-6}" y="${Y(v)+4}" font-size="10.5" text-anchor="end" fill="#5f7482">${Math.round(v)}</text>`; }
  box.innerHTML=`<svg width="${W}" height="${H}" role="img" aria-label="Vacation balance forecast">
    ${grid}
    <polyline points="${capPts}" fill="none" stroke="var(--red)" stroke-width="2" stroke-dasharray="6 4"/>
    <polyline points="${balPts}" fill="none" stroke="var(--teal)" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
  const totLost=proj.slice(0,perYear).reduce((s,x)=>s+x.lost,0);
  const first=proj.find(x=>x.lost>0.005);
  document.getElementById("chartSummary").innerHTML =
    totLost>0.005
      ? `At <b>${days} d/${p.payType==="monthly"?"mo":"cycle"}</b> you would forfeit <b class="lost">${hd(totLost)}</b>${p.rate?` ≈ <b class="lost">$${h2(totLost*p.rate)}</b>`:""} in the next 12 months (first loss: ${first?periodLabel(first.endISO):"—"}). Move the slider to find your safe pace.`
      : `✅ At <b>${days} d/${p.payType==="monthly"?"mo":"cycle"}</b> you lose <b>nothing</b> in the next 12 months.`;
}

/* ---------- save / export / import ---------- */
function saveFile(){
  persist();
  const tag=document.getElementById("app-data");
  tag.textContent=JSON.stringify(state).replace(/<\//g,"<\\/");
  const html="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  const blob=new Blob([html],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const nm=(state.profile&&state.profile.name)?state.profile.name.replace(/[^A-Za-z0-9]+/g,"_")+"_":"";
  a.download=nm+"LBL_Leave_Tracker.html";
  a.click(); URL.revokeObjectURL(a.href);
  alert("A copy of this tracker WITH your data inside was downloaded.\n\nKeep that file — opening it later (any computer, any browser) restores everything. You can delete older copies.");
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="leave_tracker_backup.json"; a.click(); URL.revokeObjectURL(a.href);
}
function importJSON(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{ try{ const s=JSON.parse(r.result);
        if(!s||typeof s!=="object"||!("profile" in s)) throw 0;
        state=s; state.periods=state.periods||[]; persist(); render();
      }catch(e){ alert("That file doesn't look like a Leave Tracker backup."); } };
    r.readAsText(f);
  };
  inp.click();
}

      <li>Leave is credited <b>after</b> each month / quadri-weekly cycle ends; you can't use vacation before you accrue it (exception: up to 2 days advance in December for winter shutdown, new hires).</li>
      <li>Once your balance reaches the cap, <b>accrual stops</b> — those hours are gone. This is the loss this tool exists to prevent.</li>
      <li>Your rate steps up automatically at 10/15/20 years of qualifying service (SMG 5/10) — prior UC, CA state agency and CSU service at ≥50% counts.</li>
      <li>Unused vacation is paid out at separation; sick leave is not (it converts toward UCRP service credit at retirement).</li>
    </ul>
    <h2 style="margin-top:18px">Sources &amp; fine print</h2>
    <p class="note">Based on LBNL RPM <a href="https://commons.lbl.gov/spaces/rpm2/pages/74319215/Vacation+Leave" target="_blank" rel="noopener">Vacation Leave</a> (pub. 7/9/2021, eff. 7/1/2020) and the Factor Leave Accrual Tables. This is an <b>unofficial planning aid</b> — LETS is the system of record; when the numbers differ, LETS wins. <b>Represented (union) employees:</b> your CBA governs — verify your rates and cap there. Policy questions → your division HR Center.</p>
  </div>`;
  document.body.appendChild(bg);
}
